<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品展示 - 春晓画室</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/jpeg" href="images/春晓画室logo.jpg">
</head>
<body>

  <!-- ========== 页头（跟首页一致） ========== -->
  <header>
    <h1><img src="images/春晓画室logo.jpg" alt="春晓画室" class="header-logo"> 春晓画室</h1>
    <p class="subtitle">用画笔描绘春天，用墨香浸润童年</p>

    <nav>
      <a href="index.html">🏠 首页</a>
      <a href="gallery.html">🖼️ 作品展示</a>
      <a href="courses.html">📚 课程介绍</a>
      <a href="index.html#about">👩‍🏫 关于我们</a>
      <a href="contact.html">📞 联系我们</a>
      <a href="login.html" style="border: 2px solid #5d4037;">🔐 登录</a>
    </nav>
  </header>

  <!-- ========== 主内容 ========== -->
  <main>

    <!-- ---- 页面标题 ---- -->
    <section>
      <h2>🖼️ 学生作品展示</h2>
      <p style="text-align:center; color:#888; max-width:600px; margin:0 auto;">
        每一幅作品都是孩子们想象力的结晶。这里记录着他们在春晓画室的成长足迹。
      </p>
    </section>

    <!-- ---- 美术作品 ---- -->
    <section>
      <h2>🎨 美术作品</h2>
      <div class="card-container" id="artwork-art-list">
        <p style="text-align:center; color:#999; padding:40px; width:100%;" id="artwork-empty-hint">暂无美术作品，老师端添加后自动展示</p>
      </div>
    </section>

    <!-- ---- 书法作品 ---- -->
    <section>
      <h2>✒️ 书法作品</h2>
      <div class="card-container" id="artwork-calligraphy-list">
        <p style="text-align:center; color:#999; padding:40px; width:100%;" id="calligraphy-empty-hint">暂无书法作品，老师端添加后自动展示</p>
      </div>
    </section>

    <!-- ---- 课堂剪影 ---- -->
    <section>
      <h2>📷 课堂剪影</h2>
      <div class="card-container">

        <div class="card">
          <img src="https://placehold.co/400x250/e8d8c8/5d4037?text=美术课堂" alt="课堂" class="card-img">
          <div class="card-body">
            <h4>美术课堂</h4>
            <p>孩子们正在专注地创作</p>
          </div>
        </div>

        <div class="card">
          <img src="https://placehold.co/400x250/d8c8b8/5d4037?text=书法课堂" alt="课堂" class="card-img">
          <div class="card-body">
            <h4>书法课堂</h4>
            <p>一笔一划，感受汉字的魅力</p>
          </div>
        </div>

        <div class="card">
          <img src="https://placehold.co/400x250/c8b8a8/5d4037?text=课堂合影" alt="合影" class="card-img">
          <div class="card-body">
            <h4>学期合影</h4>
            <p>2026春季班结课留念</p>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- ========== 页脚 ========== -->
  <footer>
    <p>&copy; 2026 春晓画室 | 让艺术陪伴孩子成长</p>
  </footer>

  <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.21.0/cloudbase.full.js"></script>
  <script src="js/cloudbase-config.js"></script>
  <script src="js/cloudbase-auth.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
