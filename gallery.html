<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="春晓画室学生美术作品与书法作品展示，记录孩子们在画室的成长足迹。创意画、素描、水彩、动漫、硬笔书法、软笔书法作品欣赏。">
  <meta property="og:title" content="学生作品展示 - 春晓画室">
  <meta property="og:description" content="每一幅作品都是孩子们想象力的结晶，记录着在春晓画室的成长足迹。">

</head>
<body>

  <!-- ========== 页头（跟首页一致） ========== -->
  <header>
    <h1><img src="images/春晓画室logo.jpg" alt="春晓画室" class="header-logo" width="48" height="48" loading="lazy"> 春晓画室</h1>
    <p class="subtitle">用画笔描绘春天，用墨香浸润童年</p>

    <nav>
      <a href="index.html">🏠 首页</a>
      <a href="gallery.html">🖼️ 作品展示</a>
      <a href="courses.html">📚 课程介绍</a>
      <a href="index.html#about">👩‍🏫 关于我们</a>
      <a href="contact.html">📞 联系我们</a>
      <a href="login.html" class="nav-login">🔐 登录</a>
    </nav>
  </header>

  <!-- ========== 主内容 ========== -->
  <main>

    <!-- ---- 页面标题 ---- -->
    <section>
      <h2>🖼️ 学生作品展示</h2>
      <p class="section-intro">
        每一幅作品都是孩子们想象力的结晶。这里记录着他们在春晓画室的成长足迹。
      </p>
    </section>

    <!-- ---- 美术作品 ---- -->
    <section>
      <h2>🎨 美术作品</h2>
      <div class="card-container" id="artwork-art-list">
        <p class="empty-hint" id="artwork-empty-hint">暂无美术作品，老师端添加后自动展示</p>
      </div>
    </section>

    <!-- ---- 书法作品 ---- -->
    <section>
      <h2>✒️ 书法作品</h2>
      <div class="card-container" id="artwork-calligraphy-list">
        <p class="empty-hint" id="calligraphy-empty-hint">暂无书法作品，老师端添加后自动展示</p>
      </div>
    </section>

    <!-- ---- 课堂剪影 ---- -->
    <section>
      <h2>📷 课堂剪影</h2>
      <div class="card-container">

        <div class="card">
          <div class="card-img card-placeholder" style="background: linear-gradient(135deg, #ffe8d0, #ffc8a0);">美术课堂</div>
          <div class="card-body">
            <h4>美术课堂</h4>
            <p>孩子们正在专注地创作</p>
          </div>
        </div>

        <div class="card">
          <div class="card-img card-placeholder" style="background: linear-gradient(135deg, #e8d8c8, #d4c0a8);">书法课堂</div>
          <div class="card-body">
            <h4>书法课堂</h4>
            <p>一笔一划，感受汉字的魅力</p>
          </div>
        </div>

        <div class="card">
          <div class="card-img card-placeholder" style="background: linear-gradient(135deg, #d8e8d0, #b8d4a8);">学期合影</div>
          <div class="card-body">
            <h4>学期合影</h4>
            <p>2026春季班结课留念</p>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- ========== 页脚 ========== -->
  <footer>
    <p>&copy; 2026 春晓画室 | 让艺术陪伴孩子成长</p>
  </footer>
